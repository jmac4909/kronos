<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Kronos terminal companion icon</title>
  <desc id="desc">A blue terminal prompt inside a dark rounded application tile.</desc>
  <defs>
    <linearGradient id="tile" x1="72" y1="52" x2="440" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111f38"/>
      <stop offset="1" stop-color="#070c16"/>
    </linearGradient>
    <linearGradient id="accent" x1="116" y1="136" x2="408" y2="376" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".55"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#tile)"/>
  <rect x="17" y="17" width="478" height="478" rx="90" fill="none" stroke="#263653" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="82" y="102" width="348" height="308" rx="35" fill="#0d1728" stroke="#3b4d6c" stroke-width="5"/>
    <path d="M82 171h348" stroke="#334561" stroke-width="5"/>
    <circle cx="124" cy="137" r="10" fill="#fb7185"/>
    <circle cx="158" cy="137" r="10" fill="#fbbf24"/>
    <circle cx="192" cy="137" r="10" fill="#4ade80"/>
    <path d="m142 244 61 54-61 54" fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M241 352h116" fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round"/>
    <circle cx="369" cy="216" r="20" fill="#0d1728" stroke="#38bdf8" stroke-width="8"/>
    <path d="M369 205v13l9 7" fill="none" stroke="#38bdf8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
